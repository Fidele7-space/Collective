version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - \"27017:27017\"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secret

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - \"6379:6379\"

  node:
    build: .
    container_name: node
    ports:
      - \"3000:3000\"
    environment:
      - NODE_ENV=development
    depends_on:
      - mongodb
      - redis

volumes:
  mongodb_data:
